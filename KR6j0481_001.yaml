body:
  text: 唐三藏沙門大廣智不空譯如是我聞一時薄伽梵住極樂世界與無量大菩薩衆前後圍繞而為説法爾時觀自在菩薩摩訶薩大吉祥天女菩薩摩訶薩等皆從座起詣世尊所頭面禮足各坐一面爾時世尊為欲利益薄福貧窮諸有情故告觀自在菩薩言善男子若有苾芻苾芻尼近事男近事女諸有情類知此大吉祥天女十二名號能受持讀誦修習供養為他宣説能除一切貧窮業障獲大富貴豐饒財寶爾時會中天龍八部異口同音咸作是言如世尊説真實不虛我等願聞十二名號惟願世尊大悲演説佛言汝當善聽今為汝説所謂吉慶吉祥蓮華嚴飾具財白色大名稱蓮華眼大光曜施食者施飲者寶光大吉祥是為十二名號汝當受持我今復説大吉祥陀羅尼曰怛儞也二合他去聲引一室哩二合抳室哩二合抳二薩嚩迦引哩野二合娑去聲引馱𩕳三悉𩕳悉𩕳四𩕳𩕳𩕳𩕳五阿上聲洛乞史茗三合曩引捨野娑嚩二合引賀引六爾時世尊説是陀羅尼已告觀自在菩薩言此大吉祥陀羅尼及十二名號能除貧窮一切不祥所有願求皆得圓滿若能晝夜三時讀誦此經每時三遍或常受持不間作饒益心隨力虔誠供養大吉祥天女菩薩速獲一切財寶豐饒吉祥安樂時觀自在菩薩摩訶薩及諸大衆天龍八部從佛聞説十二名號及陀羅尼歎末曾有皆大歡喜信受奉行􅞣􅝩􅋪􅁥
